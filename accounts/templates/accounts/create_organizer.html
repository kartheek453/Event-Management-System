{% extends 'base.html' %}

{% block title %}Create Organizer{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="card-title mb-4">Create Organizer Account</h3>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary">Create Organizer</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
