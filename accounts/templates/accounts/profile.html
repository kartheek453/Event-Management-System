{% extends 'base.html' %}

{% block title %}Profile{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="card-title mb-4">Your Profile</h3>
                <dl class="row">
                    <dt class="col-sm-4">Username</dt>
                    <dd class="col-sm-8">{{ request.user.username }}</dd>
                    <dt class="col-sm-4">Name</dt>
                    <dd class="col-sm-8">{{ request.user.name }}</dd>
                    <dt class="col-sm-4">Email</dt>
                    <dd class="col-sm-8">{{ request.user.email }}</dd>
                    <dt class="col-sm-4">Role</dt>
                    <dd class="col-sm-8">{{ request.user.get_role_display }}</dd>
                </dl>
            </div>
        </div>
    </div>
</div>
{% endblock %}
